<div class="container">
        <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4 mt-5">
            <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Bejelentkezés</h3>
                
                <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email cím</label>
                    <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    name="email" 
                    [(ngModel)]="credentials.email" 
                    required
                    email
                    #email="ngModel"
                    >
                    <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-danger">
                    <small *ngIf="email.errors?.['required']">Email cím kötelező</small>
                    <small *ngIf="email.errors?.['email']">Érvényes email cím szükséges</small>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Jelszó</label>
                    <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    [(ngModel)]="credentials.password" 
                    required
                    minlength="6"
                    #password="ngModel"
                    >
                    <div *ngIf="password.invalid && (password.dirty || password.touched)" class="text-danger">
                    <small *ngIf="password.errors?.['required']">Jelszó kötelező</small>
                    <small *ngIf="password.errors?.['minlength']">Legalább 6 karakter szükséges</small>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button 
                    type="submit" 
                    class="btn btn-primary" 
                    [disabled]="!loginForm.valid || isLoading"
                    >
                    <span *ngIf="!isLoading">Bejelentkezés</span>
                    <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                    </button>
                </div>
